services:
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      - WATCHPACK_POLLING=true
      - NEXT_PUBLIC_API_URL=http://localhost:3002
    command: npm run dev
    depends_on:
      - backend

  backend:
    build: ./backend
    ports:
      - "3002:3001"
    volumes:
      - ./backend:/app
      - backend_bundle:/usr/local/bundle
    environment:
      - DATABASE_HOST=db
      - DATABASE_USERNAME=postgres
      - DATABASE_PASSWORD=postgres
      - RAILS_ENV=development
      # 開発用の固定シークレット。本番デプロイ時は必ず別の値に差し替える。
      - DEVISE_JWT_SECRET_KEY=eb5eab4af0d73b6e073bb6aca88e999cba3bb73714aac6dddcbf4c924b7ff8b9faf5ca9e5d56b28cbf51d251c49274e5d7f2bf53997100f54edcd270a9df4c58
      - FRONTEND_ORIGIN=http://localhost:3000
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  frontend_node_modules:
  backend_bundle:
  db_data:
